<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="island" id="card">
        <div id="triangle"></div>

        <button class="moves" id="rock">
            <img src="Images/rock.png" class="moves-img" id="rock-img">
        </button>
        <div class="loader" id="l1"></div>

        <button class="moves" id="paper">
            <img src="Images/paper.png" class="moves-img" id="paper-img">
        </button>
        <div class="loader" id="l2"></div>

        <button class="moves" id="scissors">
            <img src="Images/scissors.png" class="moves-img" id="scissors-img">
        </button>
        <div class="loader" id="l3"></div>

    </div>

    <div class="island" id="status">
    
    </div>
    
    <script src="script.js"></script>
</body>
</html>
